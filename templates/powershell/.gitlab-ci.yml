psmpacker_build:
    <<: *build_template
    stage: build
    needs:
        - job: pester
          artifacts: false
    script:
        - |
            pwsh -c ./automator-devops/scripts/build/build-module.ps1 || exit 1

analyzer:
    <<: *build_template
    stage: build
    needs:
        - job: psmpacker_build
          artifacts: true
    script:
        - |
            pwsh -c ./automator-devops/scripts/test/test-sa-before-build.ps1

nupsforge_general_nuget_package:
    <<: *build_template
    stage: build
    needs:
        - job: psmpacker_build
          artifacts: true
        - job: analyzer
          artifacts: false
    script:
        - |
            pwsh -c ./automator-devops/scripts/build/build-package-generic-nuget.ps1 || exit 1

nupsforge_chocolatey_nupsec_file:
    <<: *build_template
    stage: build
    needs:
        - job: psmpacker_build
          artifacts: true
        - job: analyzer
          artifacts: false
    script:
        - |
            pwsh -c ./automator-devops/scripts/build/build-nuspec-choco.ps1 || exit 1

mono_chocolatey_package:
    <<: *build_template
    stage: build
    image: docker.io/chocolatey/choco:v2.5.1
    needs:
        - job: psmpacker_build
          artifacts: true
        - job: nupsforge_chocolatey_nupsec_file
          artifacts: true
        - job: analyzer
          artifacts: false
    before_script:
        - |
            echo "Install git cli"
            apt-get update
            apt-get install -y git
            git clone https://gitlab.com/phellams/automator-devops.git
    script:
        - |
            chmod +x ./automator-devops/scripts/build/build-package-choco.sh || exit 1
            ./automator-devops/scripts/build/build-package-choco.sh || exit 1

zip_build:
    <<: *build_template
    stage: build
    needs:
        - job: nupsforge_general_nuget_package
          artifacts: true
        - job: analyzer
          artifacts: false
    script:
        - |
            pwsh -c ./automator-devops/scripts/build/build-package-psgallery.ps1 || exit 1

# ____________________________________________________________
# ########|----> |||| Release Stage |||| <----################

upload_artifacts:
    <<: *release_template
    needs:
        - job: psmpacker_build
          artifacts: true
        - job: zip_build
          artifacts: true
        - job: nupsforge_general_nuget_package
          artifacts: true
        - job: mono_chocolatey_package
          artifacts: true
    script:
        - |
            pwsh -c ./automator-devops/scripts/deploy/deploy-artifacts.ps1 || exit 1

gitlab_release:
    <<: *release_template
    needs:
        - job: psmpacker_build
          artifacts: true
        - job: upload_artifacts
          artifacts: true
        # - job: git_tag
        #   artifacts: false
    script:
        - |
            pwsh -c ./automator-devops/scripts/release/release-from-tag-gitlab.ps1 || exit 1

codecov_release_coverage:
    <<: *release_template
    needs:
        - job: pester_coverage
          artifacts: true
        # - job: git_tag
        #   artifacts: false
    script:
        - |
            pwsh -c ./automator-devops/scripts/release/release-codecov-report.ps1 || exit 1

# coveralls_release_coverage:
#   <<: *release_template
#   needs:
#     - job: pester_coverage
#       artifacts: true
#   script:
#     - ./automator-devops/scripts/release/release-codecov-report.ps1

# ____________________________________________________________
# ########|----> |||| Deploy Stage |||| <----################

upload_gitlab_package:
    <<: *deploy_template
    needs:
        - job: nupsforge_general_nuget_package
          artifacts: true
        - job: gitlab_release
          artifacts: false
    script:
        - |
            pwsh -c ./automator-devops/scripts/deploy/deploy-gitlab.ps1 || exit 1

upload_psgallery:
    <<: *deploy_template
    needs:
        - job: psmpacker_build
          artifacts: true
        - job: zip_build
          artifacts: true
        - job: gitlab_release
          artifacts: false
    script:
        - |
            pwsh -c ./automator-devops/scripts/deploy/deploy-psgallary.ps1 || exit 1

upload_chocolatey:
    <<: *deploy_template_choco
    needs:
        - job: psmpacker_build
          artifacts: true
        - job: mono_chocolatey_package
          artifacts: true
        - job: gitlab_release
          artifacts: false
        - job: upload_psgallery
          artifacts: false
    before_script:
        - |
            echo "Install git cli"
            apt-get update
            apt-get install -y git
            git clone https://gitlab.com/phellams/automator-devops.git
    script:
        - |
            chmod +x ./automator-devops/scripts/deploy/deploy-choco.sh || exit 1
            ./automator-devops/scripts/deploy/deploy-choco.sh || exit 1

deploy-pages:
    stage: deploy
    image: sgkens/phellams-automator:$AUTOMATOR_VERSION
    before_script:
        - apt-get update && apt-get install -y --no-install-recommends brotli
    needs:
        - job: vhs_build
          artifacts: true
    script:
        - bundle exec jekyll build --destination ../public
        - cd ../public
        - find . -type f -regextype posix-extended -regex '.*\.(htm|html|xml|txt|text|js|css|svg)$' -exec gzip -9 -k {} \;
        - find . -type f -regextype posix-extended -regex '.*\.(htm|html|xml|txt|text|js|css|svg)$' -exec brotli -f {} \;
    artifacts:
        paths:
            - public
    pages: true
    rules:
        - if: '$CI_COMMIT_BRANCH == "main"'
          changes:
              - docs/**/*
              - .gitlab-ci.yml

generate-runtime-badge:
    <<: *notify_template
    tags:
        - docker
    script:
        - chmod +x ./scripts/Calculate-Runtime.ps1 ./scripts/Generate-Badge.ps1
        - |
            pwsh -NoProfile -Command '
              $runtime = & ./automator/Calculate-Runtime.ps1

              ./scripts/Generate-Badge.ps1 `
                -Label "runtime" `
                -Message $runtime `
                -Style "flat" `
                -IncludeIcon `
                -LabelColor "#555" `
                -MessageColor "#007acc" `
                -OutputPath "runtime-badge-flat.svg"

              ./scripts/Generate-Badge.ps1 `
                -Label "runtime" `
                -Message $runtime `
                -Style "for-the-badge" `
                -IncludeIcon `
                -LabelColor "#555" `
                -MessageColor "#007acc" `
                -OutputPath "runtime-badge-for-the-badge.svg"
            '
    artifacts:
        paths:
            - runtime-badge-flat.svg
            - runtime-badge-for-the-badge.svg
        expire_in: never
